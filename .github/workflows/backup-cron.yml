# Optional: manueller Aufruf von GET /api/cron/backup (z. B. wenn Vercel Cron ausfällt).
# Geplanter Betrieb: siehe vercel.json → /api/cron/backup (Sonntag).
#
# Kein `schedule` hier: Sonst löst GitHub wöchentlich einen Lauf aus, der ohne Secrets
# keine Jobs ausführt — das erzeugt nutzlose „workflow run“-Mails.
#
# Secrets (nur nötig, wenn du diesen Workflow manuell startest):
#   BACKUP_CRON_URL     z. B. https://<projekt>.vercel.app/api/cron/backup
#   BACKUP_CRON_SECRET  gleicher Wert wie CRON_SECRET / AXON_CRON_SECRET in Vercel

name: Backup (Cron-API)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    if: ${{ secrets.BACKUP_CRON_URL != '' && secrets.BACKUP_CRON_SECRET != '' }}
    steps:
      - name: Backup-Endpoint aufrufen
        env:
          URL: ${{ secrets.BACKUP_CRON_URL }}
          SECRET: ${{ secrets.BACKUP_CRON_SECRET }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request GET \
            --url "$URL" \
            --header "Authorization: Bearer $SECRET"
